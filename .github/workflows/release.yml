name: Release (macOS arm64)

# Build, Developer-ID sign, notarize, and publish an Apple Silicon DMG + ZIP
# whenever a version tag is pushed. Tag with: git tag v0.2.5 &&
# git push origin v0.2.5   (the leading "v" is stripped for the version).
#
# Required repository secrets (Settings → Secrets and variables → Actions):
#   MAC_CERT_P12          base64 of the exported "Developer ID Application" .p12
#   MAC_CERT_PASSWORD     the password set when exporting that .p12
#   APPLE_API_KEY_P8      base64 of the App Store Connect API key .p8 file
#   APPLE_API_KEY_ID      the key's Key ID
#   APPLE_API_ISSUER      the API key's Issuer ID
#   APPLE_TEAM_ID         your 10-character Apple Team ID
on:
  push:
    tags:
      - 'v*'
  # Manual run for testing. Without a tag it builds + signs + notarizes but
  # does not publish a release (artifacts are uploaded to the run instead).
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    # macos-14 is an Apple Silicon (arm64) runner — required so electron and
    # the native bits are built for arm64, matching the artifact name.
    runs-on: macos-14

    steps:
      - name: Check out the tagged commit
        uses: actions/checkout@v6

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Sync package version to the tag
        # Make the artifact name track the tag (Kendex-<tag>-arm64.*) even if
        # package.json wasn't bumped. No-op for manual (non-tag) runs.
        if: startsWith(github.ref, 'refs/tags/v')
        run: npm version --no-git-tag-version --allow-same-version "${GITHUB_REF_NAME#v}"

      - name: Verify sources
        run: npm run check

      - name: Build the self-contained Python backend runtime
        # Bundles a relocatable CPython + deps + libmagic into runtime/, which
        # extraResources ships into the app, so the shipped build needs no uv,
        # no Homebrew, and no network on the user's machine. uv + libmagic are
        # build-host-only here. electron-builder signs the embedded Mach-O next.
        run: |
          set -euo pipefail
          curl -LsSf https://astral.sh/uv/install.sh | sh
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
          export PATH="$HOME/.local/bin:$PATH"
          brew install libmagic
          bash scripts/build-backend-runtime.sh

      - name: Import the Developer ID signing certificate
        env:
          MAC_CERT_P12: ${{ secrets.MAC_CERT_P12 }}
          MAC_CERT_PASSWORD: ${{ secrets.MAC_CERT_PASSWORD }}
        run: |
          set -euo pipefail
          CERT=$RUNNER_TEMP/cert.p12
          KEYCHAIN=$RUNNER_TEMP/build.keychain
          KEYCHAIN_PW=$(uuidgen)
          echo "$MAC_CERT_P12" | base64 --decode > "$CERT"
          security create-keychain -p "$KEYCHAIN_PW" "$KEYCHAIN"
          security set-keychain-settings -lut 21600 "$KEYCHAIN"
          security unlock-keychain -p "$KEYCHAIN_PW" "$KEYCHAIN"
          security import "$CERT" -k "$KEYCHAIN" -P "$MAC_CERT_PASSWORD" \
            -T /usr/bin/codesign -T /usr/bin/security
          security set-key-partition-list -S apple-tool:,apple:,codesign: \
            -k "$KEYCHAIN_PW" "$KEYCHAIN" >/dev/null
          # Put our keychain first so codesign finds the imported identity.
          security list-keychains -d user -s "$KEYCHAIN" login.keychain-db
          rm -f "$CERT"

      - name: Write the notarization API key
        env:
          APPLE_API_KEY_P8: ${{ secrets.APPLE_API_KEY_P8 }}
        run: |
          set -euo pipefail
          echo "$APPLE_API_KEY_P8" | base64 --decode > "$RUNNER_TEMP/api_key.p8"

      - name: Build, sign, notarize, and publish
        env:
          # electron-builder signs with the Developer ID it finds in the
          # keychain; the afterSign hook (scripts/notarize.js) notarizes using
          # these App Store Connect API-key vars.
          APPLE_API_KEY: ${{ runner.temp }}/api_key.p8
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          # Publish to GitHub Releases (also generates latest-mac.yml, the feed
          # electron-updater reads) only for tag builds.
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          EB_PUBLISH: ${{ startsWith(github.ref, 'refs/tags/v') && 'always' || 'never' }}
        run: npx electron-builder --mac dmg zip --publish "$EB_PUBLISH"

      - name: Verify signature and notarization
        run: |
          codesign --verify --deep --strict --verbose=2 "dist/mac-arm64/Kendex.app"
          spctl -a -t exec -vvv "dist/mac-arm64/Kendex.app"

      # electron-builder publishes to a *draft* release by default. Drafts are
      # invisible to the public releases feed, so electron-updater can't find
      # them ("please ensure a production release exists"). Flip the release
      # live only after the build is signed, notarized, and verified above, so
      # the updater never sees a half-uploaded release.
      - name: Publish the release (un-draft so the updater can see it)
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release edit "${GITHUB_REF_NAME}" --draft=false --latest

      - name: Clean up the API key
        if: always()
        run: rm -f "$RUNNER_TEMP/api_key.p8"

      - name: Upload artifacts (manual runs)
        if: ${{ !startsWith(github.ref, 'refs/tags/v') }}
        uses: actions/upload-artifact@v7
        with:
          name: kendex-macos-arm64
          path: |
            dist/Kendex-*-arm64.dmg
            dist/Kendex-*-arm64.zip
